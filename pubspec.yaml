name: cliqs
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1
  google_sign_in: ^6.2.1

  # State Management & DI
  flutter_bloc: ^8.1.5
  bloc: ^8.1.3
  get_it: ^8.0.0

  # Logic & Data Layer
  dartz: ^0.10.1
  equatable: ^2.0.5
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3

  # UI & UX
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


